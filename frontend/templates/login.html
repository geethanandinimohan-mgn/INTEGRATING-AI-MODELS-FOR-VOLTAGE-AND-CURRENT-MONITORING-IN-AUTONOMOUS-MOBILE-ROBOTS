<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compliance AI – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-image: url('https://media.istockphoto.com/id/862650474/photo/young-engineer-testing-his-robot-in-workshop.jpg?s=612x612&w=0&k=20&c=eNpFWAbLPVVttFKFoGTDixg7ooL094gkXqmaFLzjEKY=');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in-down {
      animation: fadeInDown 1s ease-out forwards;
    }

    .animate-fade-in-up {
      animation: fadeInUp 1s ease-out forwards;
      animation-delay: 0.3s;
    }

    #message {
      background-color: hsl(155, 70%, 91%);
      color: #155724;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body class="text-white font-sans antialiased">

  <!-- 🌐 Modern Navbar -->
  <header class="absolute top-0 left-0 right-0 z-50 p-6 bg-gradient-to-r from-gray-900 to-gray-800 shadow-lg">
    <nav class="flex justify-center space-x-8">
      <a href="/index2" class="text-white hover:text-green-400 transition duration-300 ease-in-out text-lg font-medium tracking-wide">Home</a>
      <a href="/about" class="text-white hover:text-green-400 transition duration-300 ease-in-out text-lg font-medium tracking-wide">About</a>
      <a href="/register" class="text-white hover:text-green-400 transition duration-300 ease-in-out text-lg font-medium tracking-wide">Register</a>
      <a href="/login" class="text-white hover:text-green-400 transition duration-300 ease-in-out text-lg font-medium tracking-wide">Login</a>
    </nav>
  </header>

  <!-- 🔐 Login Section -->
  <div class="flex justify-center items-center min-h-screen pt-32 px-4">
    <div class="w-full max-w-md bg-white bg-opacity-10 backdrop-blur-lg p-8 rounded-xl shadow-2xl border border-gray-300 animate-fade-in-up">
      <center><h2 class="text-2xl md:text-3xl font-extrabold text-green-400 mb-6 animate-fade-in-down">LOGIN HERE</h2></center>

      {% if message %}
      <div id="message">{{ message }}</div>
      {% endif %}

      <form action="{{ url_for('login') }}" method="post">
        <input type="email" name="email" placeholder="Email" required class="w-full p-3 mb-4 rounded border border-gray-300 bg-white bg-opacity-20 text-white placeholder-gray-300" />
        <input type="password" name="password" placeholder="Password" required class="w-full p-3 mb-6 rounded border border-gray-300 bg-white bg-opacity-20 text-white placeholder-gray-300" />

        <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-full font-semibold transition duration-300">
          LOGIN
        </button>
      </form>
    </div>
  </div>

</body>
</html>
