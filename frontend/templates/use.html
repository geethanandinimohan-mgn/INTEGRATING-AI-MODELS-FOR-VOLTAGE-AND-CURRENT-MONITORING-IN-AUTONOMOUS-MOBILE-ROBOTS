

<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>June Recognition Awards</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Montserrat:wght@700;800&display=swap"rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>

    :root {

      --primary: #6a11cb;

      --secondary: #2575fc;

      --accent: #ff6b6b;

      --light: #f8f9ff;

      --dark: #1a1a2e;

      --success: #4ade80;

      --warning: #fbbf24;

    }

   

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }

   

    body {

      font-family: 'Poppins', sans-serif;

      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);

      min-height: 100vh;

      padding: 20px;

      display: flex;

      justify-content: center;

      align-items: center;

      position: relative;

      overflow-x: hidden;

    }

   

    /* Particles background */

    .particles {

      position: absolute;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      z-index: 0;

    }

   

    .particle {

      position: absolute;

      border-radius: 50%;

      background: rgba(255, 255, 255, 0.5);

      animation: float 15s infinite linear;

    }

   

    @keyframes float {

      0% {

        transform: translateY(0) translateX(0);

        opacity: 0;

      }

      10% {

        opacity: 1;

      }

      90% {

        opacity: 1;

      }

      100% {

        transform: translateY(-100vh) translateX(100px);

        opacity: 0;

      }

    }

   

    .container {

      background: rgba(255, 255, 255, 0.1);

      backdrop-filter: blur(12px);

      border: 1px solid rgba(255, 255, 255, 0.2);

      max-width: 700px;

      width: 100%;

      margin: 30px auto;

      border-radius: 20px;

      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);

      padding: 40px;

      color: white;

      position: relative;

      z-index: 1;

      overflow: hidden;

    }

   

    /* Decorative elements */

    .corner-deco {

      position: absolute;

      width: 150px;

      height: 150px;

      border-radius: 50%;

      filter: blur(40px);

      opacity: 0.7;

      z-index: -1;

    }

   

    .deco-1 {

      background: var(--primary);

      top: -50px;

      left: -50px;

    }

   

    .deco-2 {

      background: var(--secondary);

      bottom: -50px;

      right: -50px;

    }

   

    .header {

      text-align: center;

      padding: 20px 0 30px;

      position: relative;

    }

   

    .header h1 {

      margin: 0;

      color: white;

      font-family: 'Montserrat', sans-serif;

      font-size: 2.8rem;

      font-weight: 800;

      letter-spacing: 1px;

      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);

      position: relative;

      display: inline-block;

    }

   

    .header h1::after {

      content: "";

      position: absolute;

      bottom: -10px;

      left: 50%;

      transform: translateX(-50%);

      width: 100px;

      height: 4px;

      background: linear-gradient(90deg, var(--primary), var(--secondary));

      border-radius: 2px;

    }

   

    .badge {

      display: inline-block;

      padding: 12px 30px;

      margin-top: 20px;

      border-radius: 30px;

      background: linear-gradient(90deg, var(--primary), var(--secondary));

      color: white;

      font-size: 1.1rem;

      font-weight: 600;

      text-transform: uppercase;

      letter-spacing: 1px;

      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

      animation: pulse 2s infinite;

    }

   

    @keyframes pulse {

      0% {

        box-shadow: 0 0 0 0 rgba(106, 17, 203, 0.7);

      }

      70% {

        box-shadow: 0 0 0 15px rgba(106, 17, 203, 0);

      }

      100% {

        box-shadow: 0 0 0 0 rgba(106, 17, 203, 0);

      }

    }

   

    .section {

      margin-top: 30px;

      padding: 30px;

      border-radius: 15px;

      background: rgba(255, 255, 255, 0.08);

      position: relative;

      overflow: hidden;

      transition: transform 0.3s ease, box-shadow 0.3s ease;

    }

   

    .section:hover {

      transform: translateY(-5px);

      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);

      background: rgba(255, 255, 255, 0.12);

    }

   

    .section::before {

      content: "";

      position: absolute;

      top: 0;

      left: 0;

      width: 5px;

      height: 100%;

      background: linear-gradient(to bottom, var(--primary), var(--secondary));

    }

   

    .section h2 {

      color: white;

      font-size: 1.8rem;

      margin-bottom: 20px;

      display: flex;

      align-items: center;

      gap: 10px;

    }

   

    .section h2 i {

      font-size: 1.5rem;

      color: var(--warning);

    }

   

    .name-box {

      background: rgba(255, 255, 255, 0.1);

      padding: 25px;

      border-radius: 12px;

      font-size: 1.8rem;

      font-weight: 700;

      text-align: center;

      position: relative;

      overflow: hidden;

      animation: fadeIn 0.8s ease-out;

      transition: all 0.3s ease;

      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1), 0 5px 15px rgba(0, 0, 0, 0.1);

    }

   

    .name-box:hover {

      transform: scale(1.02);

      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2), 0 8px 25px rgba(0, 0, 0, 0.2);

      background: rgba(255, 255, 255, 0.15);

    }

   

    .name-box::before {

      content: "";

      position: absolute;

      top: 0;

      left: 0;

      width: 100%;

      height: 4px;

      background: linear-gradient(90deg, var(--primary), var(--secondary));

    }

   

    .name-box strong {

      background: linear-gradient(45deg, var(--warning), #ffdd59);

      -webkit-background-clip: text;

      background-clip: text;

      -webkit-text-fill-color: transparent;

      position: relative;

    }

   

    .name-box .decor {

      position: absolute;

      font-size: 4rem;

      opacity: 0.1;

      z-index: 0;

    }

   

    .decor-left {

      left: 15px;

      top: 10px;

    }

   

    .decor-right {

      right: 15px;

      bottom: 10px;

    }

   

    .trophy {

      display: inline-block;

      margin: 0 10px;

      animation: bounce 2s infinite;

    }

   

    @keyframes bounce {

      0%, 100% {

        transform: translateY(0);

      }

      50% {

        transform: translateY(-15px);

      }

    }

   

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform: translateY(20px);

      }

      to {

        opacity: 1;

        transform: translateY(0);

      }

    }

   

    .footer {

      margin-top: 50px;

      text-align: center;

      font-size: 1.1rem;

      color: rgba(255, 255, 255, 0.7);

      padding-top: 20px;

      border-top: 1px solid rgba(255, 255, 255, 0.1);

    }

   

    .signature {

      display: inline-block;

      margin-top: 10px;

      font-family: 'Dancing Script', cursive;

      font-size: 1.8rem;

      color: var(--warning);

    }

   

    .confetti {

      position: absolute;

      width: 10px;

      height: 10px;

      background: var(--accent);

      opacity: 0;

      animation: confetti-fall 5s linear forwards;

    }

   

    @keyframes confetti-fall {

      0% {

        transform: translateY(-100px) rotate(0deg);

        opacity: 1;

      }

      100% {

        transform: translateY(100vh) rotate(720deg);

        opacity: 0;

      }

    }

   

    /* Responsive design */

    @media (max-width: 768px) {

      .container {

        padding: 25px;

      }

     

      .header h1 {

        font-size: 2.2rem;

      }

     

      .section {

        padding: 20px;

      }

     

      .name-box {

        font-size: 1.5rem;

        padding: 20px 15px;

      }

    }

   

    @media (max-width: 480px) {

      .header h1 {

        font-size: 1.8rem;

      }

     

      .badge {

        font-size: 0.9rem;

        padding: 10px 20px;

      }

     

      .section h2 {

        font-size: 1.5rem;

      }

     

      .name-box {

        font-size: 1.3rem;

      }

    }

  </style>

</head>

<body>

  <!-- Background particles -->

  <div class="particles" id="particles"></div>

 

  <!-- Decorative elements -->

  <div class="corner-deco deco-1"></div>

  <div class="corner-deco deco-2"></div>

 

  <div class="container">

    <div class="header">

      <h1><i class="fas fa-star"></i> June Month Recognition <i class="fas fa-star"></i></h1>

      <div class="badge">Celebrating Excellence</div>

    </div>

 

    <div class="section">

      <h2><i class="fas fa-trophy"></i> Star Performer of the Month</h2>

      <div class="name-box">

        <span class="decor decor-left"><i class="fas fa-star"></i></span>

        <span class="trophy">🏆</span> <strong>Rakesh</strong> <span class="trophy">🏆</span>

        <span class="decor decor-right"><i class="fas fa-star"></i></span>

      </div>

    </div>

 

    <div class="section">

      <h2><i class="fas fa-lightbulb"></i> Contributor of the Month</h2>

      <div class="name-box">

        <span class="decor decor-left"><i class="fas fa-award"></i></span>

        <span class="trophy">🌟</span> <strong>Harish</strong> <span class="trophy">🌟</span>

        <span class="decor decor-right"><i class="fas fa-award"></i></span>

      </div>

    </div>

 

    <div class="footer">

      Keep shining and inspiring the team!<br>

      <span class="signature">— SPOC (ROSHNI)</span>

    </div>

  </div>

 

  <script>

    // Create background particles

    document.addEventListener('DOMContentLoaded', function() {

      const particlesContainer = document.getElementById('particles');

      const particleCount = 50;

     

      for (let i = 0; i < particleCount; i++) {

        const particle = document.createElement('div');

        particle.classList.add('particle');

       

        // Random properties

        const size = Math.random() * 5 + 2;

        const posX = Math.random() * 100;

        const delay = Math.random() * 15;

        const duration = 10 + Math.random() * 20;

        const color = `rgba(${Math.floor(Math.random() * 255)}, ${Math.floor(Math.random() * 255)}, ${Math.floor(Math.random() * 255)}, ${Math.random() * 0.5 + 0.3})`;

       

        particle.style.width = `${size}px`;

        particle.style.height = `${size}px`;

        particle.style.left = `${posX}%`;

        particle.style.animationDelay = `${delay}s`;

        particle.style.animationDuration = `${duration}s`;

        particle.style.background = color;

       

        particlesContainer.appendChild(particle);

      }

     

      // Create confetti on load

      createConfetti();

    });

   

    function createConfetti() {

      const colors = ['#ff6b6b', '#4ade80', '#fbbf24', '#60a5fa', '#c084fc'];

     

      for (let i = 0; i < 100; i++) {

        const confetti = document.createElement('div');

        confetti.classList.add('confetti');

       

        const color = colors[Math.floor(Math.random() * colors.length)];

        const size = Math.random() * 10 + 5;

        const posX = Math.random() * 100;

        const delay = Math.random() * 3;

        const duration = 2 + Math.random() * 3;

       

        confetti.style.width = `${size}px`;

        confetti.style.height = `${size}px`;

        confetti.style.left = `${posX}%`;

        confetti.style.animationDelay = `${delay}s`;

        confetti.style.animationDuration = `${duration}s`;

        confetti.style.background = color;

       

        document.body.appendChild(confetti);

       

        // Remove confetti after animation completes

        setTimeout(() => {

          confetti.remove();

        }, (duration + delay) * 1000);

      }

    }

  </script>

</body>

</html>
